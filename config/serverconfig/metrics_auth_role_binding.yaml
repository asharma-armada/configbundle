# Binds the sc-controller SA to the shared metrics-auth-role ClusterRole (from
# ../rbac/metrics_auth_role.yaml). Required for controller-runtime's secure
# metrics-server: it calls TokenReview + SubjectAccessReview to verify the
# incoming bearer token from Prometheus. Without this binding the metrics
# server rejects the scrape with HTTP 500 "Authentication failed" — the exact
# symptom we hit when the ServiceMonitor was first applied.
#
# The name-references (`metrics-auth-role`, `serverconfig-controller`) are
# rewritten by the top-level `configbundle-` namePrefix in config/default so
# the final CRB targets `configbundle-metrics-auth-role` and
# `configbundle-serverconfig-controller`.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: serverconfig-metrics-auth-rolebinding
  labels:
    app.kubernetes.io/name: serverconfig-controller
    app.kubernetes.io/managed-by: kustomize
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: metrics-auth-role
subjects:
- kind: ServiceAccount
  name: serverconfig-controller
  namespace: system
