# Example ConfigBundle for local dev.
#
# What this exercises:
#   - servers[] decomposition into cluster-scoped ServerConfig CRs
#     (one per entry; name derived from lowercased hostname)
#   - kubernetesClusters[].backup decomposition into cluster-scoped
#     BackupConfig CRs (one per ClusterBackup graph node;
#     name derived from cluster.backup.orbId with ':' → '-')
#   - orbId identity fields on every node — bundler-populated in prod,
#     required here because they're the SSA listMapKey
#
# Run:
#   kubectl apply -f config/samples/v1_configbundle.yaml
#   kubectl get cb,serverconfigs.armada.ai,bc
#   # → 1 ConfigBundle, 1 ServerConfig (colo-r740-01), 1 BackupConfig
#   #   (colo-cluster-001-backup)
#
# Field names + Go type names mirror the orbital schema exactly. See
# ~/armada/orbital/schema/schema.graphql for the source of truth.
# Cluster-scoped resource — no namespace field.
apiVersion: armada.ai/v1
kind: ConfigBundle
metadata:
  name: colo-galleon
spec:
  orbId: "colo:colo-galleon"
  datacenter: colo
  servers:
    - orbId: "colo:srv-001"
      serviceTag: 3RK3V64
      hostname: colo-r740-01
      oobIP: 10.10.1.45
      idracSettings:
        orbId: "colo:srv-001-idrac"
        firmwareVersion: "7.20.10.05"
        sshEnabled: false
        ipmiEnabled: false
        lockdownModeEnabled: false
        osToIdracPassThroughEnabled: false
        usbManagementPortEnabled: true
        dhcpEnabled: false
        racadmEnabled: true
  kubernetesClusters:
    - orbId: "colo:cluster-001"
      name: primary
      backup:
        orbId: "colo:cluster-001-backup"
        velero:
          orbId: "colo:cluster-001-velero"
          enabled: true
          schedule: "0 2 * * *"
          location: "s3://colo-backups/velero"
        etcd:
          orbId: "colo:cluster-001-etcd"
          enabled: true
          schedule: "0 3 * * *"
          location: "s3://colo-backups/etcd"
        s3Sync:
          orbId: "colo:cluster-001-s3sync"
          enabled: true
