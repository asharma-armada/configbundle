apiVersion: v1
kind: Service
metadata:
  # Name is `controller` so the kustomize-applied `configbundle-` prefix yields
  # the DNS-friendly Service name `configbundle-controller`. Orb reaches the
  # dispatch endpoint at `http://configbundle-controller.configbundle-system:8095/dispatch`.
  name: controller
  namespace: system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: configbundle
    app.kubernetes.io/managed-by: kustomize
spec:
  type: ClusterIP
  selector:
    control-plane: controller-manager
    app.kubernetes.io/name: configbundle
  ports:
  - name: dispatch
    port: 8095
    targetPort: dispatch
    protocol: TCP
