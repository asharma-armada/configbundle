apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller
  namespace: system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: configbundle
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: configbundle
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: configbundle
    spec:
      # TODO(user): Uncomment the following code to configure the nodeAffinity expression
      # according to the platforms which are supported by your solution.
      # It is considered best practice to support multiple architectures. You can
      # build your manager image using the makefile target docker-buildx.
      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #         - matchExpressions:
      #           - key: kubernetes.io/arch
      #             operator: In
      #             values:
      #               - amd64
      #               - arm64
      #               - ppc64le
      #               - s390x
      #           - key: kubernetes.io/os
      #             operator: In
      #             values:
      #               - linux
      securityContext:
        # Projects are configured by default to adhere to the "restricted" Pod Security Standards.
        # This ensures that deployments meet the highest security requirements for Kubernetes.
        # For more details, see: https://kubernetes.io/docs/concepts/security/pod-security-standards/#restricted
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - command:
        - /manager
        args:
          - --leader-elect
          - --health-probe-bind-address=:8081
        image: controller:latest
        # Always re-pull on rollout — we ship dev iterations against mutable
        # tags (e.g. v0.0.1 gets overwritten in ACR). Without this, kubelet's
        # default for non-:latest tags is IfNotPresent and the cached image
        # sticks. Switch back to IfNotPresent once tags are immutable.
        imagePullPolicy: Always
        name: manager
        env:
        # OPERATOR_NAMESPACE is where cb-controller writes its own state
        # ConfigMaps (mapping + last-applied-spec). ConfigBundle and ServerConfig
        # are cluster-scoped; only the operator's internal state is namespaced.
        # Default to the pod's own namespace via downward API so state co-locates
        # with the controller.
        - name: OPERATOR_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        # Orb's divergence intake. Orb runs in the `orb` namespace; cb-controller
        # runs in `configbundle-system` — short-name `orb` only resolves within
        # the controller's own namespace, so we need the FQDN form.
        - name: ORB_DIVERGENCE_INTAKE_URL
          value: http://orb.orb.svc.cluster.local:8010/api/v1/divergence
        - name: CB_CONTROLLER_PORT
          value: ":8095"
        ports:
        - containerPort: 8081
          name: health
          protocol: TCP
        - containerPort: 8095
          name: dispatch
          protocol: TCP
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        # TODO(user): Configure the resources accordingly based on the project requirements.
        # More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        volumeMounts: []
      volumes: []
      serviceAccountName: controller
      terminationGracePeriodSeconds: 10
