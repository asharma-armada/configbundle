apiVersion: v1
kind: Service
metadata:
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: configbundle
    app.kubernetes.io/managed-by: kustomize
  # Controller-runtime's built-in metrics endpoint (HTTPS, :8443).
  # Distinct from sc-controller's app-level `serverconfig-controller-metrics`
  # which exposes domain gauges on :8093.
  name: controller-metrics
  namespace: system
spec:
  ports:
  - name: https
    port: 8443
    protocol: TCP
    targetPort: 8443
  selector:
    control-plane: controller-manager
    app.kubernetes.io/name: configbundle
