---
# ClusterRole — BackupConfig is cluster-scoped, so list/watch/get/patch
# requires cluster-level permissions. Velero Schedule CRDs live in the velero
# namespace; the etcd CronJob lives in kube-system. Both groups are listed.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: backupconfig-manager-role
rules:
- apiGroups:
  - armada.ai
  resources:
  - backupconfigs
  verbs:
  - get
  - list
  - watch
# Read-only access to the parent ConfigBundle so the reconciler can mirror
# spec.ignored[] entries into the `armada_backup_field_ignored` metric for
# drift-alert suppression. Never writes back.
- apiGroups:
  - armada.ai
  resources:
  - configbundles
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - armada.ai
  resources:
  - backupconfigs/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - velero.io
  resources:
  - schedules
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - batch
  resources:
  - cronjobs
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
# Event emission — replaces the bounded status.recentPatches[] we used to
# maintain. controller-runtime writes core-v1 Events via EventRecorder;
# needs create + patch (patch is used for dedup increments of count/lastTimestamp).
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
