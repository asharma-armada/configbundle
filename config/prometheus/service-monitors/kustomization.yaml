# ServiceMonitors for cb/sc/bc-controllers. All land in configbundle-system.
namespace: configbundle-system

resources:
- monitor.yaml                 # cb-controller
- monitor_serverconfig.yaml    # sc-controller (requires cilium-policy/ to scrape — hostNetwork)
- monitor_backupconfig.yaml    # bc-controller

