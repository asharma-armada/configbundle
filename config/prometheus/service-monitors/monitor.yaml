# ServiceMonitor for cb-controller (`configbundle-controller-metrics` Service).
#
# The `release: kube-prometheus-stack` label is mandatory — it's what the
# kube-prometheus-stack operator's serviceMonitorSelector matches on. Without
# it, the ServiceMonitor is invisible to Prometheus and the scrape target
# never registers.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: configbundle-controller
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: configbundle
    app.kubernetes.io/managed-by: kustomize
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - configbundle-system
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: configbundle
  endpoints:
    - port: https           # matches the port name on configbundle-controller-metrics Service
      path: /metrics
      scheme: https
      interval: 30s
      bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
      tlsConfig:
        # Metrics endpoint uses the controller-runtime self-signed cert.
        # cert-manager wiring is available via monitor_tls_patch.yaml — enable when ready.
        insecureSkipVerify: true
